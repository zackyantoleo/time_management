<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catet — catatan cepat berprioritas</title>
<meta name="theme-color" content="#0e7a6f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #eef1f4;
    --surface: #ffffff;
    --surface-2: #f5f7f9;
    --ink: #1b2530;
    --ink-muted: #5c6b7a;
    --ink-faint: #8b98a5;
    --line: #d8dee5;
    --accent: #0e7a6f;
    --accent-soft: #e0f0ee;
    --accent-ink: #ffffff;
    --focus-ring: #0e7a6f;
    --p-urgent: #c2362b;
    --p-urgent-soft: #f9e9e7;
    --p-tinggi: #c07514;
    --p-tinggi-soft: #f8efe0;
    --p-sedang: #2563a8;
    --p-sedang-soft: #e6eef7;
    --p-rendah: #6b7885;
    --p-rendah-soft: #edf0f3;
    --late: #c2362b;
    --shadow: 0 1px 2px rgba(27,37,48,.06), 0 4px 16px rgba(27,37,48,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #10161c;
      --surface: #1a222b;
      --surface-2: #212b35;
      --ink: #e5eaf0;
      --ink-muted: #9aa8b5;
      --ink-faint: #6b7885;
      --line: #2d3944;
      --accent: #3ab5a6;
      --accent-soft: #16332f;
      --accent-ink: #08211d;
      --focus-ring: #3ab5a6;
      --p-urgent: #e05d51;
      --p-urgent-soft: #3a1f1c;
      --p-tinggi: #dd9a3e;
      --p-tinggi-soft: #362a17;
      --p-sedang: #5d93cf;
      --p-sedang-soft: #1c2a3a;
      --p-rendah: #8b98a5;
      --p-rendah-soft: #262f38;
      --late: #e05d51;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
    }
  }
  :root[data-theme="light"] {
    --bg: #eef1f4; --surface: #ffffff; --surface-2: #f5f7f9;
    --ink: #1b2530; --ink-muted: #5c6b7a; --ink-faint: #8b98a5; --line: #d8dee5;
    --accent: #0e7a6f; --accent-soft: #e0f0ee; --accent-ink: #ffffff; --focus-ring: #0e7a6f;
    --p-urgent: #c2362b; --p-urgent-soft: #f9e9e7;
    --p-tinggi: #c07514; --p-tinggi-soft: #f8efe0;
    --p-sedang: #2563a8; --p-sedang-soft: #e6eef7;
    --p-rendah: #6b7885; --p-rendah-soft: #edf0f3;
    --late: #c2362b;
    --shadow: 0 1px 2px rgba(27,37,48,.06), 0 4px 16px rgba(27,37,48,.06);
  }
  :root[data-theme="dark"] {
    --bg: #10161c; --surface: #1a222b; --surface-2: #212b35;
    --ink: #e5eaf0; --ink-muted: #9aa8b5; --ink-faint: #6b7885; --line: #2d3944;
    --accent: #3ab5a6; --accent-soft: #16332f; --accent-ink: #08211d; --focus-ring: #3ab5a6;
    --p-urgent: #e05d51; --p-urgent-soft: #3a1f1c;
    --p-tinggi: #dd9a3e; --p-tinggi-soft: #362a17;
    --p-sedang: #5d93cf; --p-sedang-soft: #1c2a3a;
    --p-rendah: #8b98a5; --p-rendah-soft: #262f38;
    --late: #e05d51;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, "Ubuntu", "Cantarell", sans-serif;
    padding: 24px 16px 80px;
  }
  .mono { font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Ubuntu Mono", Menlo, monospace; font-variant-numeric: tabular-nums; }

  .app { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  header.top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
  .brand .tag { font-size: 12.5px; color: var(--ink-muted); }
  .top-actions { display: flex; gap: 8px; }

  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--focus-ring); outline-offset: 2px;
  }
  .btn-ghost {
    font-size: 12.5px; color: var(--ink-muted);
    padding: 5px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--surface);
  }
  .btn-ghost:hover { color: var(--ink); border-color: var(--ink-faint); }

  /* ---- Focus card ---- */
  .focus-card {
    background: var(--surface); border: 1px solid var(--line);
    border-left: 4px solid var(--accent);
    border-radius: 10px; box-shadow: var(--shadow);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .focus-card .eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .focus-card .eyebrow .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  @media (prefers-reduced-motion: reduce) { .focus-card .eyebrow .dot { animation: none; } }
  .focus-card .focus-text { font-size: 17px; font-weight: 600; text-wrap: balance; }
  .focus-card .focus-meta { font-size: 12.5px; color: var(--ink-muted); }
  .focus-card .focus-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
  .focus-card.empty { border-left-color: var(--line); }
  .focus-card.empty .eyebrow { color: var(--ink-faint); }
  .focus-card.empty .focus-text { color: var(--ink-faint); font-weight: 500; font-size: 14.5px; }

  .btn-solid {
    background: var(--accent); color: var(--accent-ink);
    font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 7px;
  }
  .btn-solid:hover { filter: brightness(1.08); }
  .btn-line {
    font-size: 13px; font-weight: 500; padding: 6px 13px;
    border: 1px solid var(--line); border-radius: 7px; background: var(--surface-2); color: var(--ink);
  }
  .btn-line:hover { border-color: var(--ink-faint); }

  /* ---- Capture bar ---- */
  .capture {
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    box-shadow: var(--shadow); padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .capture-row1 { display: flex; gap: 8px; }
  .capture input[type="text"] {
    flex: 1; font: inherit; color: var(--ink); background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 7px; padding: 9px 12px; min-width: 0;
  }
  .capture input[type="text"]::placeholder { color: var(--ink-faint); }
  .capture-row2 { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .cap-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .cap-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); margin-right: 2px; }
  .chip {
    font-size: 12.5px; font-weight: 500; padding: 4px 11px;
    border: 1px solid var(--line); border-radius: 999px; background: var(--surface); color: var(--ink-muted);
  }
  .chip:hover { border-color: var(--ink-faint); color: var(--ink); }
  .chip[aria-pressed="true"] { font-weight: 600; }
  .chip.pr-urgent[aria-pressed="true"] { background: var(--p-urgent-soft); border-color: var(--p-urgent); color: var(--p-urgent); }
  .chip.pr-tinggi[aria-pressed="true"] { background: var(--p-tinggi-soft); border-color: var(--p-tinggi); color: var(--p-tinggi); }
  .chip.pr-sedang[aria-pressed="true"] { background: var(--p-sedang-soft); border-color: var(--p-sedang); color: var(--p-sedang); }
  .chip.pr-rendah[aria-pressed="true"] { background: var(--p-rendah-soft); border-color: var(--p-rendah); color: var(--p-rendah); }
  .chip.time[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .capture input[type="datetime-local"] {
    font: inherit; font-size: 12.5px; color: var(--ink-muted);
    background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px;
  }
  .cap-hint { font-size: 11.5px; color: var(--ink-faint); margin-left: auto; }
  .cap-hint kbd {
    font-family: inherit; font-size: 10.5px; border: 1px solid var(--line); border-bottom-width: 2px;
    border-radius: 4px; padding: 0 5px; background: var(--surface-2);
  }

  /* ---- Sections ---- */
  .section { display: flex; flex-direction: column; gap: 8px; }
  .section-head { display: flex; align-items: baseline; gap: 8px; }
  .section-head h2 {
    font-size: 11.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin: 0;
  }
  .section-head .count { font-size: 11.5px; color: var(--ink-faint); }
  .section.s-urgent h2 { color: var(--p-urgent); }
  .section.s-tinggi h2 { color: var(--p-tinggi); }
  .section.s-sedang h2 { color: var(--p-sedang); }
  .section.s-rendah h2 { color: var(--p-rendah); }
  .section.s-selesai h2 { color: var(--ink-faint); }

  ul.tasks { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  li.task {
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px 10px 9px;
    border-left-width: 4px;
  }
  li.task.p-urgent { border-left-color: var(--p-urgent); }
  li.task.p-tinggi { border-left-color: var(--p-tinggi); }
  li.task.p-sedang { border-left-color: var(--p-sedang); }
  li.task.p-rendah { border-left-color: var(--p-rendah); }
  li.task.done { opacity: .6; border-left-color: var(--line); }
  li.task.done .task-text { text-decoration: line-through; }

  .check {
    width: 19px; height: 19px; flex: none; margin-top: 2px;
    border: 1.5px solid var(--ink-faint); border-radius: 5px; background: var(--surface);
    display: grid; place-items: center; font-size: 12px; line-height: 1; color: transparent;
  }
  .check:hover { border-color: var(--accent); color: var(--accent); }
  li.task.done .check { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

  .task-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .task-text { overflow-wrap: break-word; }
  .task-text[contenteditable="true"] { outline: 1px dashed var(--accent); border-radius: 3px; padding: 0 3px; }
  .task-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 11.5px; color: var(--ink-faint); }
  .due-badge {
    font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
  }
  .due-badge.late { background: var(--p-urgent-soft); color: var(--late); }

  .task-actions { display: flex; gap: 2px; flex: none; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center;
    color: var(--ink-faint); font-size: 14px;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--ink); }
  .icon-btn.danger:hover { color: var(--late); }

  .empty-note {
    font-size: 13px; color: var(--ink-faint); background: var(--surface-2);
    border: 1px dashed var(--line); border-radius: 8px; padding: 10px 14px;
  }

  details.done-wrap summary {
    cursor: pointer; font-size: 11.5px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-faint); user-select: none;
    display: flex; align-items: baseline; gap: 8px; list-style: none;
  }
  details.done-wrap summary::before { content: "▸"; font-size: 10px; }
  details.done-wrap[open] summary::before { content: "▾"; }
  details.done-wrap summary::-webkit-details-marker { display: none; }
  details.done-wrap ul.tasks { margin-top: 8px; }
  .clear-done { font-size: 11.5px; color: var(--ink-faint); text-decoration: underline; text-underline-offset: 2px; }
  .clear-done:hover { color: var(--late); }

  footer.foot { text-align: center; font-size: 11.5px; color: var(--ink-faint); }

  /* ---- Daily routines ---- */
  .routine-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    padding: 3px 12px;
  }
  .routine-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px dashed var(--line); }
  .routine-row:first-child { border-top: none; }
  .routine-row .check { margin-top: 0; }
  .routine-row.done .r-text { text-decoration: line-through; color: var(--ink-faint); }
  .r-text { flex: 1; min-width: 0; overflow-wrap: break-word; }
  .section.s-rutin h2 { color: var(--accent); }
  details.routine-manage summary {
    cursor: pointer; font-size: 11.5px; color: var(--ink-faint); user-select: none;
    text-decoration: underline; text-underline-offset: 2px; list-style: none; width: max-content;
  }
  details.routine-manage summary::-webkit-details-marker { display: none; }
  .routine-editor {
    margin-top: 8px; background: var(--surface-2); border: 1px dashed var(--line); border-radius: 8px;
    padding: 10px 12px; display: flex; flex-direction: column; gap: 10px;
  }
  .routine-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .routine-form input[type="text"] {
    flex: 1; min-width: 160px; font: inherit; color: var(--ink); background: var(--surface);
    border: 1px solid var(--line); border-radius: 7px; padding: 7px 10px;
  }
  .routine-form input[type="time"] {
    font: inherit; font-size: 12.5px; color: var(--ink-muted);
    background: var(--surface); border: 1px solid var(--line); border-radius: 7px; padding: 5px 8px;
  }
  .day-chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .day-chip {
    font-size: 11.5px; font-weight: 600; padding: 3px 8px;
    border: 1px solid var(--line); border-radius: 999px; background: var(--surface); color: var(--ink-faint);
  }
  .day-chip[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .routine-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
  .routine-list li { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
  .routine-list .r-days { font-size: 11px; color: var(--ink-faint); }

  /* ---- View tabs ---- */
  .tabs {
    display: flex; gap: 4px; width: max-content;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 9px; padding: 4px;
  }
  .tab { font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 6px; color: var(--ink-muted); }
  .tab:hover { color: var(--ink); }
  .tab[aria-selected="true"] { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }
  .hidden { display: none !important; }

  /* ---- Work log ---- */
  .log-day {
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;
  }
  .log-day-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .log-day-head h3 { font-size: 14px; font-weight: 700; margin: 0; }
  .log-day-head .log-sum { font-size: 11.5px; color: var(--ink-faint); }
  .log-day-head .btn-ghost { margin-left: auto; }
  ul.log-entries { list-style: none; margin: 0; padding: 0; }
  .log-entry {
    display: flex; gap: 10px; align-items: baseline; padding: 7px 0;
    border-top: 1px dashed var(--line);
  }
  .log-entry:first-child { border-top: none; }
  .log-time { font-size: 12px; color: var(--ink-faint); flex: none; }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; align-self: center; }
  .log-dot.p-urgent { background: var(--p-urgent); }
  .log-dot.p-tinggi { background: var(--p-tinggi); }
  .log-dot.p-sedang { background: var(--p-sedang); }
  .log-dot.p-rendah { background: var(--p-rendah); }
  .log-dot.p-rutin { background: var(--accent); }
  .log-text { flex: 1; min-width: 0; overflow-wrap: break-word; font-size: 14px; }
  .log-mins {
    font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); flex: none;
  }
  .log-entry .icon-btn { width: 24px; height: 24px; font-size: 12px; align-self: center; }

  /* ---- In-page reminder toasts ---- */
  .toasts {
    position: fixed; right: 16px; bottom: 16px; z-index: 50;
    display: flex; flex-direction: column; gap: 8px; max-width: min(340px, calc(100vw - 32px));
  }
  .toast {
    background: var(--surface); color: var(--ink);
    border: 1px solid var(--line); border-left: 4px solid var(--p-urgent);
    border-radius: 8px; box-shadow: var(--shadow);
    padding: 10px 12px; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
  }
  .toast .toast-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--p-urgent);
  }
  .toast .toast-body { font-size: 13.5px; overflow-wrap: break-word; }
  .toast .toast-hint { font-size: 10.5px; color: var(--ink-faint); }
  @media (prefers-reduced-motion: no-preference) {
    .toast { animation: toast-in .18s ease-out; }
    @keyframes toast-in { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
  }
</style>

<div class="app">
  <header class="top">
    <div class="brand">
      <h1>Catet</h1>
      <span class="tag">catatan cepat berprioritas</span>
    </div>
    <div class="top-actions">
      <button class="btn-ghost" id="notif-btn" title="Nyalakan/matikan pengingat waktu">🔔 Pengingat</button>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Tampilan">
    <button class="tab" id="tab-papan" role="tab" aria-selected="true">📋 Papan</button>
    <button class="tab" id="tab-log" role="tab" aria-selected="false">🗒 Log kerja</button>
  </nav>

  <section class="focus-card board-view" id="focus-card" aria-live="polite"></section>

  <section class="capture board-view" aria-label="Tambah catatan">
    <div class="capture-row1">
      <input type="text" id="cap-text" placeholder="Catat cepat… mis. “kabari mas Budi soal deploy” lalu Enter" autofocus>
      <button class="btn-solid" id="cap-save">Simpan</button>
    </div>
    <div class="capture-row2">
      <div class="cap-group" role="group" aria-label="Prioritas">
        <span class="cap-label">Prioritas</span>
        <button class="chip pr-urgent" data-pr="urgent" aria-pressed="false">Urgent</button>
        <button class="chip pr-tinggi" data-pr="tinggi" aria-pressed="false">Tinggi</button>
        <button class="chip pr-sedang" data-pr="sedang" aria-pressed="true">Sedang</button>
        <button class="chip pr-rendah" data-pr="rendah" aria-pressed="false">Rendah</button>
      </div>
      <div class="cap-group" role="group" aria-label="Waktu">
        <span class="cap-label">Kapan</span>
        <button class="chip time" data-due="none" aria-pressed="true">Bebas</button>
        <button class="chip time" data-due="today">Hari ini</button>
        <button class="chip time" data-due="tomorrow-am">Besok pagi</button>
        <input type="datetime-local" id="cap-due-custom" aria-label="Pilih waktu sendiri">
      </div>
      <span class="cap-hint"><kbd>Enter</kbd> simpan · <kbd>Alt</kbd>+<kbd>1–4</kbd> prioritas</span>
    </div>
  </section>

  <div id="sections" class="board-view"></div>

  <div id="worklog" class="hidden"></div>

  <footer class="foot">Data tersimpan lokal di browser ini (localStorage) — tidak dikirim ke mana pun.</footer>
</div>

<div class="toasts" id="toasts" role="status" aria-live="assertive"></div>

<script>
"use strict";

const STORE_KEY = "catet.tasks.v1";
const PRIORITIES = [
  { id: "urgent", label: "Urgent — kerjakan sekarang" },
  { id: "tinggi", label: "Tinggi" },
  { id: "sedang", label: "Sedang" },
  { id: "rendah", label: "Rendah — kalau sempat" },
];
const PR_ORDER = { urgent: 0, tinggi: 1, sedang: 2, rendah: 3 };

const WORKLOG_KEY = "catet.worklog.v1";

let tasks = load();
let worklog = loadWorklog();
let capPriority = "sedang";
let capDue = { kind: "none" }; // none | today | tomorrow-am | custom(value)
let view = "papan"; // papan | log

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}
function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(tasks));
}
function loadWorklog() {
  try { return JSON.parse(localStorage.getItem(WORKLOG_KEY)) || []; }
  catch { return []; }
}
function saveWorklog() {
  localStorage.setItem(WORKLOG_KEY, JSON.stringify(worklog));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ---------- work log (append-only, terpisah dari daftar tugas) ---------- */
function localDateStr(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}
// Akumulasi menit fokus berhenti di sini; dipanggil setiap tugas keluar dari
// slot fokus (ditunda, diganti, atau selesai).
function stopFocus(t) {
  if (t.focusedAt) {
    t.focusMins = (t.focusMins || 0) + Math.max(0, (Date.now() - new Date(t.focusedAt)) / 60000);
    t.focusedAt = null;
  }
}
function completeTask(t) {
  stopFocus(t);
  t.status = "selesai";
  t.doneAt = new Date().toISOString();
  const when = new Date(t.doneAt);
  worklog.push({
    id: uid(), taskId: t.id, date: localDateStr(when), ts: t.doneAt,
    text: t.text, priority: t.priority, mins: Math.round(t.focusMins || 0),
  });
  t.focusMins = 0;
  save(); saveWorklog();
}
function uncompleteTask(t) {
  t.status = "aktif"; t.doneAt = null;
  for (let i = worklog.length - 1; i >= 0; i--) {
    if (worklog[i].taskId === t.id) { worklog.splice(i, 1); break; }
  }
  save(); saveWorklog();
}
/* ---------- daily routines (standup, cek email, dst.) ---------- */
const ROUTINE_KEY = "catet.routines.v1";
const RDAY_KEY = "catet.routineday.v1";
let routines = (() => {
  try { return JSON.parse(localStorage.getItem(ROUTINE_KEY)) || []; }
  catch { return []; }
})();
let rday = (() => {
  try { return JSON.parse(localStorage.getItem(RDAY_KEY)) || null; }
  catch { return null; }
})();
function saveRoutines() { localStorage.setItem(ROUTINE_KEY, JSON.stringify(routines)); }
function saveRday() { localStorage.setItem(RDAY_KEY, JSON.stringify(rday)); }
// Centang & status pengingat rutinitas hanya berlaku untuk satu tanggal;
// ganti hari = checklist kosong lagi.
function ensureRoutineDay() {
  const today = localDateStr(new Date());
  if (!rday || rday.date !== today) {
    rday = { date: today, doneIds: [], notifiedIds: [] };
    saveRday();
  }
}
function todaysRoutines() {
  ensureRoutineDay();
  const dow = new Date().getDay();
  return routines.filter((r) => r.days.includes(dow));
}
function routineInstanceId(r) { return "rutin:" + r.id + "@" + rday.date; }
function toggleRoutine(r) {
  ensureRoutineDay();
  const iid = routineInstanceId(r);
  if (rday.doneIds.includes(r.id)) {
    rday.doneIds = rday.doneIds.filter((id) => id !== r.id);
    for (let i = worklog.length - 1; i >= 0; i--) {
      if (worklog[i].taskId === iid) { worklog.splice(i, 1); break; }
    }
  } else {
    rday.doneIds.push(r.id);
    const now = new Date();
    worklog.push({
      id: uid(), taskId: iid, date: rday.date, ts: now.toISOString(),
      text: r.text, priority: "rutin", mins: 0,
    });
  }
  saveRday(); saveWorklog();
}

// Tugas yang sudah berstatus selesai sebelum fitur log ada ikut dicatat sekali.
(function backfillWorklog() {
  let changed = false;
  for (const t of tasks) {
    if (t.status === "selesai" && t.doneAt && !worklog.some((e) => e.taskId === t.id)) {
      const when = new Date(t.doneAt);
      worklog.push({
        id: uid(), taskId: t.id, date: localDateStr(when), ts: t.doneAt,
        text: t.text, priority: t.priority, mins: Math.round(t.focusMins || 0),
      });
      changed = true;
    }
  }
  if (changed) saveWorklog();
})();

function resolveDue() {
  const now = new Date();
  if (capDue.kind === "today") {
    const d = new Date(now); d.setHours(17, 0, 0, 0);
    if (d <= now) d.setTime(now.getTime() + 60 * 60 * 1000);
    return d.toISOString();
  }
  if (capDue.kind === "tomorrow-am") {
    const d = new Date(now); d.setDate(d.getDate() + 1); d.setHours(8, 0, 0, 0);
    return d.toISOString();
  }
  if (capDue.kind === "custom" && capDue.value) return new Date(capDue.value).toISOString();
  return null;
}

function addTask(text) {
  text = text.trim();
  if (!text) return;
  tasks.push({
    id: uid(), text, priority: capPriority, due: resolveDue(),
    createdAt: new Date().toISOString(),
    status: "aktif", doneAt: null, focusedAt: null, notified: false,
  });
  save(); render();
}

/* ---------- time formatting ---------- */
const HARI = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];
function fmtClock(d) {
  return String(d.getHours()).padStart(2, "0") + "." + String(d.getMinutes()).padStart(2, "0");
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function fmtDue(iso) {
  const d = new Date(iso), now = new Date();
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
  if (d < now) {
    const mins = Math.round((now - d) / 60000);
    if (mins < 60) return "terlambat " + mins + " mnt";
    if (mins < 60 * 24) return "terlambat " + Math.round(mins / 60) + " jam";
    return "terlambat " + Math.round(mins / 1440) + " hari";
  }
  if (sameDay(d, now)) return "hari ini " + fmtClock(d);
  if (sameDay(d, tomorrow)) return "besok " + fmtClock(d);
  return HARI[d.getDay()] + " " + d.getDate() + "/" + (d.getMonth() + 1) + " " + fmtClock(d);
}
function fmtAgo(iso) {
  const mins = Math.round((Date.now() - new Date(iso)) / 60000);
  if (mins < 1) return "baru saja";
  if (mins < 60) return mins + " mnt lalu";
  const h = Math.floor(mins / 60);
  if (h < 24) return h + " jam " + (mins % 60) + " mnt";
  return Math.floor(h / 24) + " hari lalu";
}

/* ---------- rendering ---------- */
const $ = (sel) => document.querySelector(sel);
function el(tag, cls, text) {
  const n = document.createElement(tag);

  if (text != null) n.textContent = text;

}

function renderFocus() {

      "Belum ada tugas yang difokuskan. Tekan ▶ pada tugas di daftar supaya tidak hilang saat kamu diinterupsi."));

function taskRow(t) {
  const li = el("li", "task p-" + t.priority + (t.status === "selesai" ? " done" : ""));

  const check = el("button", "check", "✓");
  check.title = t.status === "selesai" ? "Tandai belum selesai" : "Tandai selesai";
  check.setAttribute("aria-label", check.title);
  check.onclick = () => {
    if (t.status === "selesai") uncompleteTask(t);
    else completeTask(t);
    render();
  };

  const body = el("div", "task-body");
  const text = el("div", "task-text", t.text);
  text.title = "Klik dua kali untuk mengedit";
  text.ondblclick = () => {
    text.contentEditable = "true"; text.focus();
    const range = document.createRange(); range.selectNodeContents(text);
    const sel = getSelection(); sel.removeAllRanges(); sel.addRange(range);
  };
  const commit = () => {
    text.contentEditable = "false";
    const v = text.textContent.trim();
    if (v && v !== t.text) { t.text = v; save(); }
    render();
  };
  text.onblur = commit;
  text.onkeydown = (e) => {
    if (e.key === "Enter") { e.preventDefault(); text.blur(); }
    if (e.key === "Escape") { text.textContent = t.text; text.blur(); }
  };
  body.append(text);

  const meta = el("div", "task-meta");
  if (t.due && t.status !== "selesai") {
    const late = new Date(t.due) < new Date();
    meta.append(el("span", "due-badge mono" + (late ? " late" : ""), (late ? "⚠ " : "🕑 ") + fmtDue(t.due)));
  }
  meta.append(el("span", "mono", "dicatat " + fmtAgo(t.createdAt)));
  if (t.status === "selesai" && t.doneAt) meta.append(el("span", "mono", "selesai " + fmtAgo(t.doneAt)));
  body.append(meta);

  const actions = el("div", "task-actions");
  if (t.status !== "selesai") {
    const focusBtn = el("button", "icon-btn", "▶");
    focusBtn.title = "Kerjakan sekarang (jadikan fokus)";
    focusBtn.setAttribute("aria-label", focusBtn.title);
    focusBtn.onclick = () => {
      const cur = tasks.find((x) => x.status === "fokus");
      if (cur && cur !== t) { stopFocus(cur); cur.status = "aktif"; }
      t.status = "fokus"; t.focusedAt = new Date().toISOString();
      save(); render();
    };
    actions.append(focusBtn);
  }
  const delBtn = el("button", "icon-btn danger", "✕");
  delBtn.title = "Hapus"; delBtn.setAttribute("aria-label", "Hapus");
  delBtn.onclick = () => {
    if (confirm("Hapus catatan ini?\n\n“" + t.text + "”")) {
      tasks = tasks.filter((x) => x.id !== t.id); save(); render();
    }
  };
  actions.append(delBtn);

  li.append(check, body, actions);
  return li;
}

/* ---------- routines rendering ---------- */
const HARI_PENDEK = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];
let routineManageOpen = false;
let newRoutineDays = new Set([1, 2, 3, 4, 5]); // default hari kerja
function fmtDays(days) {
  if (days.length === 7) return "setiap hari";
  const sorted = [...days].sort();
  if (sorted.join() === "1,2,3,4,5") return "Sen–Jum";
  return sorted.map((d) => HARI_PENDEK[d]).join(", ");
}

    if (!text || !newRoutineDays.size) return;

function renderSections() {
  const wrap = $("#sections");
  wrap.innerHTML = "";
  const active = tasks.filter((t) => t.status === "aktif");
  active.sort((a, b) => {
    if (PR_ORDER[a.priority] !== PR_ORDER[b.priority]) return PR_ORDER[a.priority] - PR_ORDER[b.priority];
    if (a.due && b.due) return new Date(a.due) - new Date(b.due);
    if (a.due) return -1;
    if (b.due) return 1;
    return new Date(a.createdAt) - new Date(b.createdAt);
  });

  const frag = document.createDocumentFragment();
  renderRoutines(frag);
  let any = false;
  for (const p of PRIORITIES) {
    const items = active.filter((t) => t.priority === p.id);
    if (!items.length) continue;
    any = true;
    const sec = el("section", "section s-" + p.id);
    const head = el("div", "section-head");
    head.append(el("h2", null, p.label), el("span", "count mono", String(items.length)));
    sec.append(head);
    const ul = el("ul", "tasks");
    items.forEach((t) => ul.append(taskRow(t)));
    sec.append(ul);
    frag.append(sec);
    sec.style.marginBottom = "18px";
  }
  if (!any) {
    frag.append(el("div", "empty-note",
      "Daftar kosong. Semua yang mampir ke kepala — tiket baru, permintaan teman, follow-up meeting — catat di atas biar tidak lupa."));
  }

  const done = tasks.filter((t) => t.status === "selesai")
    .sort((a, b) => new Date(b.doneAt || 0) - new Date(a.doneAt || 0));
  if (done.length) {
    const det = document.createElement("details");
    det.className = "done-wrap section s-selesai";
    det.style.marginTop = "6px";
    const sum = document.createElement("summary");
    sum.append("Selesai ", el("span", "count mono", String(done.length)));
    const clear = el("button", "clear-done", "bersihkan");
    clear.onclick = (e) => {
      e.preventDefault();
      if (confirm("Hapus semua " + done.length + " catatan yang sudah selesai?")) {
        tasks = tasks.filter((t) => t.status !== "selesai"); save(); render();
      }
    };
    sum.append(clear);
    det.append(sum);
    const ul = el("ul", "tasks");
    done.forEach((t) => ul.append(taskRow(t)));
    det.append(ul);
    frag.append(det);
  }
  wrap.append(frag);
}

/* ---------- work log view ---------- */
const BULAN = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
const HARI_FULL = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
const PR_LABEL = { urgent: "urgent", tinggi: "tinggi", sedang: "sedang", rendah: "rendah", rutin: "rutin" };
function fmtDayName(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  return HARI_FULL[date.getDay()] + ", " + d + " " + BULAN[m - 1] + " " + y;
}
function fmtDayHeading(dateStr) {
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  let label = fmtDayName(dateStr);
  if (dateStr === localDateStr(new Date())) label = "Hari ini — " + label;
  else if (dateStr === localDateStr(yesterday)) label = "Kemarin — " + label;
  return label;
}
function fmtMins(mins) {
  if (!mins || mins < 1) return null;
  if (mins < 60) return mins + " mnt";
  return Math.floor(mins / 60) + " j " + (mins % 60) + " mnt";
}
function dayLogText(dateStr, entries) {
  const lines = entries.map((e) => {
    let line = "- " + fmtClock(new Date(e.ts)) + " " + e.text + " [" + PR_LABEL[e.priority] + "]";
    const m = fmtMins(e.mins);
    if (m) line += " (fokus ±" + m + ")";
    return line;
  });
  return "Log kerja " + fmtDayName(dateStr) + "\n" + lines.join("\n");
}
function copyText(text, btn) {
  const done = () => {
    const old = btn.textContent;
    btn.textContent = "Tersalin ✓";
    setTimeout(() => { btn.textContent = old; }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}
function fallbackCopy(text, done) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.append(ta); ta.select();
  try { document.execCommand("copy"); done(); } catch {}
  ta.remove();
}

function renderWorklog() {
  const wrap = $("#worklog");

  if (!worklog.length) {
    wrap.append(el("div", "empty-note",

    return;
  }
  const byDate = new Map();
  for (const e of worklog) {
    if (!byDate.has(e.date)) byDate.set(e.date, []);

  }
  const dates = [...byDate.keys()].sort().reverse();
  for (const dateStr of dates) {
    const entries = byDate.get(dateStr).sort((a, b) => new Date(a.ts) - new Date(b.ts));
    const day = el("section", "log-day");

    const totalMins = Math.round(entries.reduce((s, e) => s + (e.mins || 0), 0));
    let sum = entries.length + " tugas";
    if (fmtMins(totalMins)) sum += " · fokus " + fmtMins(totalMins);
    head.append(el("span", "log-sum mono", sum));
    const copyBtn = el("button", "btn-ghost", "Salin");
    copyBtn.title = "Salin log hari ini sebagai teks";

    head.append(copyBtn);

    const ul = el("ul", "log-entries");
    for (const e of entries) {

      del.onclick = () => {
        if (confirm("Hapus entri log ini?\n\n“" + e.text + "”")) {
          worklog = worklog.filter((x) => x.id !== e.id); saveWorklog(); render();
        }
      };
      li.append(del);
      ul.append(li);
    }
    day.append(ul);
    wrap.append(day);
  }
}

/* ---------- view switching ---------- */
function setView(v) {

  $("#tab-papan").setAttribute("aria-selected", String(v === "papan"));
  $("#tab-log").setAttribute("aria-selected", String(v === "log"));
  document.querySelectorAll(".board-view").forEach((n) => n.classList.toggle("hidden", v !== "papan"));
  $("#worklog").classList.toggle("hidden", v !== "log");
  render();
}
$("#tab-papan").onclick = () => setView("papan");
$("#tab-log").onclick = () => setView("log");

function render() {
  if (view === "papan") { renderFocus(); renderSections(); }
  else renderWorklog();
  renderTitle();
}

/* ---------- capture interactions ---------- */
$("#cap-save").onclick = () => { addTask($("#cap-text").value); $("#cap-text").value = ""; $("#cap-text").focus(); };
$("#cap-text").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { addTask(e.target.value); e.target.value = ""; }
});

document.querySelectorAll(".chip[data-pr]").forEach((btn) => {
  btn.onclick = () => setPriority(btn.dataset.pr);
});
function setPriority(pr) {
  capPriority = pr;
  document.querySelectorAll(".chip[data-pr]").forEach((b) =>
    b.setAttribute("aria-pressed", String(b.dataset.pr === pr)));
}

document.querySelectorAll(".chip[data-due]").forEach((btn) => {
  btn.onclick = () => {
    capDue = { kind: btn.dataset.due === "none" ? "none" : btn.dataset.due };
    $("#cap-due-custom").value = "";
    syncDueChips(btn.dataset.due);
  };
});
$("#cap-due-custom").onchange = (e) => {
  if (e.target.value) { capDue = { kind: "custom", value: e.target.value }; syncDueChips(null); }
};
function syncDueChips(activeKind) {
  document.querySelectorAll(".chip[data-due]").forEach((b) =>
    b.setAttribute("aria-pressed", String(b.dataset.due === activeKind)));
}

document.addEventListener("keydown", (e) => {
  if (e.altKey && e.key >= "1" && e.key <= "4") {
    e.preventDefault();
    setPriority(PRIORITIES[Number(e.key) - 1].id);
    $("#cap-text").focus();
  }
});

/* ---------- reminders ----------
   Dua lapis, dengan toggle nyala/mati sendiri (terpisah dari izin browser):
   1. Toast dalam halaman + bip — selalu bisa, termasuk saat notifikasi
      browser diblokir atau halaman dibuka dari file://.
   2. Notifikasi sistem — bonus kalau izin browser diberikan. Sekali izin
      ditolak, browser tidak akan menampilkan prompt lagi; membukanya harus
      lewat pengaturan situs (ikon gembok), bukan dari halaman ini. */
const REMIND_KEY = "catet.reminders.v1";
let remindersOn = localStorage.getItem(REMIND_KEY) !== "0"; // default nyala

function sysNotifAvailable() {
  return "Notification" in window && Notification.permission === "granted";
}
function updateNotifBtn() {
  const btn = $("#notif-btn");
  if (!remindersOn) {
    btn.textContent = "🔕 Pengingat mati";
    btn.title = "Klik untuk menyalakan pengingat waktu";
  } else if (sysNotifAvailable()) {
    btn.textContent = "🔔 Pengingat aktif";
    btn.title = "Pengingat lewat notifikasi sistem + di dalam halaman. Klik untuk mematikan.";
  } else {
    btn.textContent = "🔔 Pengingat aktif (di tab ini)";
    btn.title = "Pengingat muncul di dalam halaman ini. Notifikasi sistem belum diizinkan browser. Klik untuk mematikan.";
  }
}
$("#notif-btn").onclick = () => {
  // Simpan state toggle dulu — permintaan izin browser bisa lama atau tidak
  // pernah terjawab, dan tidak boleh menyandera toggle-nya.
  remindersOn = !remindersOn;
  localStorage.setItem(REMIND_KEY, remindersOn ? "1" : "0");
  updateNotifBtn();
  if (remindersOn && "Notification" in window) {
    if (Notification.permission === "default") {
      Notification.requestPermission().then(updateNotifBtn).catch(() => {});
    } else if (Notification.permission === "denied") {
      alert(
        "Pengingat dinyalakan — akan muncul di dalam halaman ini.\n\n" +
        "Notifikasi sistem sedang diblokir oleh browser (pernah ditolak, atau halaman dibuka dari file://). " +
        "Browser tidak mengizinkan halaman meminta ulang izinnya. Untuk membukanya:\n" +
        "• Klik ikon gembok/setelan di kiri address bar → Notifikasi → Izinkan, lalu muat ulang; atau\n" +
        "• Buka pengaturan situs browser dan hapus blokir notifikasi untuk halaman ini.\n\n" +
        "Tanpa itu pun pengingat di dalam halaman tetap jalan."
      );
    }
  }
};
updateNotifBtn();

function showToast(t) {
  const wrap = $("#toasts");
  const toast = el("div", "toast");
  toast.append(
    el("div", "toast-title", "⏰ Waktunya!"),
    el("div", "toast-body", t.text),
    el("div", "toast-hint", "klik untuk menutup")
  );
  toast.onclick = () => toast.remove();
  wrap.append(toast);
  setTimeout(() => toast.remove(), 30000);
}
let audioCtx = null;
function beep() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") { audioCtx.resume(); }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine"; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
  } catch {}
}

function checkDue() {
  const now = new Date();
  let changed = false;
  let dueNow = [];
  for (const t of tasks) {
    if (t.status !== "selesai" && t.due && !t.notified && new Date(t.due) <= now) {
      t.notified = true; changed = true;
      dueNow.push(t);
    }
  }
  if (changed) save();
  // Rutinitas berjam: ingatkan sekali per hari sampai dicentang.
  ensureRoutineDay();
  const nowHM = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
  let rdayChanged = false;
  for (const r of todaysRoutines()) {
    if (r.time && r.time <= nowHM &&
        !rday.doneIds.includes(r.id) && !rday.notifiedIds.includes(r.id)) {
      rday.notifiedIds.push(r.id); rdayChanged = true;
      dueNow.push({ text: "Rutinitas: " + r.text });
    }
  }
  if (rdayChanged) saveRday();
  if (remindersOn) {
    for (const t of dueNow) {
      showToast(t);
      if (sysNotifAvailable()) {
        try { new Notification("Catet — waktunya!", { body: t.text }); } catch {}
      }
    }
    if (dueNow.length) beep();
  }
  render(); // refresh relative times & overdue badges
}
setInterval(checkDue, 30000);

// Offline di HP: service worker hanya jalan bila di-serve lewat https/localhost,
// tidak dari file:// atau lingkungan tanpa dukungan SW.
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

render();
</script>
