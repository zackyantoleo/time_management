<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catet — catatan cepat berprioritas</title>
<meta name="theme-color" content="#0e7a6f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<div class="app">
  <header class="top">
    <div class="brand">
      <h1>Catet</h1>
      <span class="tag">catatan cepat berprioritas</span>
    </div>
    <div class="top-actions">
      <button class="btn-ghost" id="notif-btn" title="Nyalakan/matikan pengingat waktu">🔔<span class="btn-label"> Pengingat</span></button>
      <button class="btn-ghost" id="export-btn" title="Unduh cadangan semua data sebagai file .json">⬇<span class="btn-label"> Ekspor</span></button>
      <button class="btn-ghost" id="import-btn" title="Pulihkan data dari file .json (mengganti data di browser ini)">⬆<span class="btn-label"> Impor</span></button>
      <input type="file" id="import-file" accept="application/json,.json" hidden>
    </div>
  </header>

  <div class="tabs-row">
    <nav class="tabs" role="tablist" aria-label="Tampilan">
      <button class="tab" id="tab-papan" role="tab" aria-selected="true">📋 Papan</button>
      <button class="tab" id="tab-jira" role="tab" aria-selected="false">🎫 Jira</button>
      <button class="tab" id="tab-log" role="tab" aria-selected="false">🗒 Log kerja</button>
    </nav>
    <input type="search" id="search" placeholder="Cari tugas / tiket / log…" aria-label="Cari">
  </div>

  <section class="focus-card board-view" id="focus-card" aria-live="polite"></section>

  <section class="capture board-view" aria-label="Tambah catatan">
    <div class="capture-row1">
      <input type="text" id="cap-text" placeholder="Catat cepat… mis. “kabari mas Budi soal deploy” lalu Enter" autofocus>
      <button class="btn-solid" id="cap-save">Simpan</button>
    </div>
    <div class="capture-row2">
      <div class="cap-group" role="group" aria-label="Prioritas">
        <span class="cap-label">Prioritas</span>
        <button class="chip pr-urgent" data-pr="urgent" aria-pressed="false">Urgent</button>
        <button class="chip pr-tinggi" data-pr="tinggi" aria-pressed="false">Tinggi</button>
        <button class="chip pr-sedang" data-pr="sedang" aria-pressed="true">Sedang</button>
        <button class="chip pr-rendah" data-pr="rendah" aria-pressed="false">Rendah</button>
      </div>
      <div class="cap-group" role="group" aria-label="Waktu">
        <span class="cap-label">Kapan</span>
        <button class="chip time" data-due="none" aria-pressed="true">Bebas</button>
        <button class="chip time" data-due="today">Hari ini</button>
        <button class="chip time" data-due="tomorrow-am">Besok pagi</button>
        <input type="datetime-local" id="cap-due-custom" aria-label="Pilih waktu sendiri">
      </div>
      <button class="chip time hidden" id="sprint-capture" aria-pressed="false" title="Masukkan tugas baru ke sprint aktif">🏃 Sprint</button>
      <button class="chip" id="score-toggle" aria-pressed="false" title="Bantu menilai prioritas dari dampak, usaha, dan tenggat">🧮 Bantu nilai</button>
      <span class="cap-hint"><kbd>Enter</kbd> simpan · <kbd>Alt</kbd>+<kbd>1–4</kbd> prioritas</span>
    </div>
    <div class="capture-row3 hidden" id="score-panel">
      <div class="cap-group" role="group" aria-label="Dampak kalau ditunda">
        <span class="cap-label">Kalau ditunda?</span>
        <button class="chip sc" data-dampak="1" aria-pressed="false">Aman</button>
        <button class="chip sc" data-dampak="2" aria-pressed="false">Mengganggu</button>
        <button class="chip sc" data-dampak="3" aria-pressed="false">Memblokir orang/produksi</button>
      </div>
      <div class="cap-group" role="group" aria-label="Perkiraan usaha">
        <span class="cap-label">Usaha</span>
        <button class="chip sc" data-usaha="S" aria-pressed="false">⚡ ≤1 jam</button>
        <button class="chip sc" data-usaha="M" aria-pressed="false">⏱ ±½ hari</button>
        <button class="chip sc" data-usaha="L" aria-pressed="false">⏳ ≥1 hari</button>
      </div>
      <div class="score-verdict" id="score-verdict">Pilih dampak (dan usaha) — saran prioritas &amp; kapan mulai muncul di sini.</div>
    </div>
  </section>

  <div id="sections" class="board-view"></div>

  <div id="jiraview" class="hidden"></div>

  <div id="worklog" class="hidden"></div>

  <footer class="foot">Data tersimpan lokal di browser ini (localStorage)<span id="sync-status"></span></footer>
</div>

<div class="toasts" id="toasts" role="status" aria-live="assertive"></div>

<!-- Urutan dimuat penting: util → state/fitur → render → app (inisialisasi).
     Skrip klasik (bukan module) supaya tetap bisa dibuka langsung dari file://. -->
<script src="assets/js/util.js"></script>
<script src="assets/js/tasks.js"></script>
<script src="assets/js/sprints.js"></script>
<script src="assets/js/capture.js"></script>
<script src="assets/js/routines.js"></script>
<script src="assets/js/jira.js"></script>
<script src="assets/js/board.js"></script>
<script src="assets/js/worklog.js"></script>
<script src="assets/js/reminders.js"></script>
<script src="assets/js/sync.js"></script>
<script src="assets/js/backup.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
